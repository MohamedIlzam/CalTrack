version: '3.8'

services:
  # PostgreSQL database with pgvector extension pre-installed
  db:
    image: pgvector/pgvector:pg16
    container_name: caltrack-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123@#$
      POSTGRES_DB: caltrack
    ports:
      # Maps local port 5433 to container port 5432 to avoid conflict with your native Postgres
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: caltrack-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
